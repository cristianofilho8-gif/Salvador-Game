<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f766e" />
  <title>Controle de Van</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQ/l8L6Jp0N2Cq4QBlVq4lR6R4GL5xE=" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <noscript>Este aplicativo precisa de JavaScript para funcionar.</noscript>

  <header class="topbar no-print">
    <button id="btnHome" class="ghost small" type="button">Início</button>
    <div>
      <strong>Controle de Van</strong>
      <span id="connectionHint">Local</span>
    </div>
    <button id="btnQuickLocation" class="ghost small" type="button">GPS</button>
  </header>

  <main id="app" class="app-shell"></main>

  <div id="toast" class="toast" aria-live="polite"></div>

  <div id="lusoModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="lusoTitle">
    <div class="modal-card">
      <button class="modal-close" data-close-modal="lusoModal" type="button">×</button>
      <h2 id="lusoTitle">Registrar Luso</h2>
      <p id="lusoHelp" class="muted"></p>
      <label>Quantidade de pessoas
        <input id="lusoQty" type="number" min="0" inputmode="numeric" value="0" />
      </label>
      <label>Pagaram em dinheiro
        <input id="lusoCashQty" type="number" min="0" inputmode="numeric" value="0" />
      </label>
      <label>Pagaram em Pix
        <input id="lusoPixQty" type="number" min="0" inputmode="numeric" value="0" />
      </label>
      <label>Observação opcional
        <textarea id="lusoNotes" rows="3" placeholder="Ex.: desceram na entrada, GPS impreciso..."></textarea>
      </label>
      <div class="row-actions">
        <button id="btnSaveLuso" class="primary" type="button">Salvar Luso</button>
        <button class="secondary" data-close-modal="lusoModal" type="button">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="photoModal" class="modal hidden alert-modal" role="dialog" aria-modal="true" aria-labelledby="photoTitle">
    <div class="modal-card alert-card">
      <h2 id="photoTitle">Foto obrigatória</h2>
      <p id="photoAlertText" class="big-alert-text"></p>
      <p id="photoDistance" class="muted"></p>
      <input id="photoInput" type="file" accept="image/*" capture="environment" class="hidden" />
      <div class="row-actions">
        <button id="btnTakePhoto" class="danger" type="button">Tirar Foto</button>
        <button id="btnPhotoLater" class="secondary" type="button">Agora não</button>
      </div>
      <p class="small-note">Se a foto não for tirada, ela ficará pendente para justificativa administrativa.</p>
    </div>
  </div>

  <div id="confirmModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2 id="confirmTitle">Confirmar ação</h2>
      <p id="confirmText"></p>
      <div class="row-actions">
        <button id="confirmYes" class="danger" type="button">Confirmar</button>
        <button id="confirmNo" class="secondary" type="button">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
