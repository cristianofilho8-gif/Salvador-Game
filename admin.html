<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Administrador — Bairros de Salvador</title>
  <style>
    :root{
      --bg:#08111f; --card:rgba(10,18,32,.78); --line:rgba(255,255,255,.08);
      --text:#f8fafc; --muted:#bfd0e4; --accent:#60a5fa; --ok:#22c55e; --bad:#ef4444;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:Inter,Arial,Helvetica,sans-serif; color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(34,211,238,.16), transparent 30%),
        radial-gradient(circle at top right, rgba(96,165,250,.20), transparent 35%),
        linear-gradient(180deg,#08111f 0%, #050913 100%);
    }
    .wrap{max-width:1220px; margin:0 auto; padding:20px}
    .topbar,.card{
      border:1px solid var(--line); border-radius:28px; background:var(--card);
      backdrop-filter:blur(16px); box-shadow:0 24px 60px rgba(0,0,0,.28);
    }
    .topbar{
      padding:16px 18px; display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:18px;
    }
    .brand{display:flex; gap:12px; align-items:center}
    .icon{
      width:50px; height:50px; border-radius:18px; display:grid; place-items:center; font-size:24px;
      background:linear-gradient(180deg,#2563eb,#06b6d4)
    }
    .actions{display:flex; gap:10px; flex-wrap:wrap}
    .btn{
      border:none; color:var(--text); background:rgba(10,18,32,.88); border:1px solid rgba(255,255,255,.08);
      text-decoration:none; font-weight:800; font-size:14px; padding:12px 16px; border-radius:16px; cursor:pointer;
    }
    .btn.primary{background:linear-gradient(180deg,#2563eb,#1d4ed8)}
    .btn.danger{background:linear-gradient(180deg,#dc2626,#b91c1c)}
    .grid{display:grid; grid-template-columns:1fr 1fr; gap:18px}
    .card{padding:20px}
    h1,h2{margin:0 0 12px; letter-spacing:-.03em}
    .muted{color:var(--muted)}
    .field{display:grid; gap:8px; margin-bottom:14px}
    label{font-size:13px; font-weight:700}
    input, textarea{
      width:100%; border-radius:16px; border:1px solid rgba(255,255,255,.10); background:rgba(7,12,24,.86);
      color:var(--text); padding:12px 14px; font:inherit;
    }
    textarea{min-height:100px; resize:vertical}
    .triple{display:grid; grid-template-columns:repeat(3,1fr); gap:12px}
    .hint{font-size:12px; color:var(--muted); margin-top:-4px; margin-bottom:14px}
    .status{
      margin-top:12px; padding:12px 14px; border-radius:16px; background:rgba(34,197,94,.12);
      border:1px solid rgba(34,197,94,.18); color:#dcfce7; display:none;
    }
    .ranking-box{
      max-height:420px; overflow:auto; display:grid; gap:10px; margin-top:12px;
    }
    .ranking-item{
      padding:12px; border-radius:18px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.07);
    }
    @media (max-width:980px){ .grid,.triple{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="icon">⚙️</div>
        <div>
          <div style="font-size:28px;font-weight:900;letter-spacing:-.04em;">Painel de administrador</div>
          <div class="muted">Edite textos, multiplicadores e controle o ranking.</div>
        </div>
      </div>
      <div class="actions">
        <a class="btn" href="index.html">Landing page</a>
        <a class="btn primary" href="game.html">Abrir jogo</a>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Textos do projeto</h2>
        <div class="field">
          <label for="landingTitle">Título da landing page</label>
          <input id="landingTitle" />
        </div>
        <div class="field">
          <label for="landingSubtitle">Subtítulo da landing page</label>
          <textarea id="landingSubtitle"></textarea>
        </div>
        <div class="field">
          <label for="gameTitle">Título do jogo</label>
          <input id="gameTitle" />
        </div>
        <div class="field">
          <label for="gameSubtitle">Subtítulo do jogo</label>
          <input id="gameSubtitle" />
        </div>
        <div class="field">
          <label for="brandBadge">Selo / badge</label>
          <input id="brandBadge" />
        </div>
        <div class="field">
          <label for="gameDescription">Descrição do jogo</label>
          <textarea id="gameDescription"></textarea>
        </div>
        <div class="field">
          <label for="mapHint">Texto de ajuda acima do mapa</label>
          <input id="mapHint" />
        </div>
        <div class="field">
          <label for="emptyTitle">Título da tela inicial do mapa</label>
          <input id="emptyTitle" />
        </div>
        <div class="field">
          <label for="emptyCopy">Texto da tela inicial do mapa</label>
          <textarea id="emptyCopy"></textarea>
        </div>
        <div class="field">
          <label for="startButtonText">Texto do botão de começar</label>
          <input id="startButtonText" />
        </div>
      </div>

      <div class="card">
        <h2>Regras e ranking</h2>
        <div class="field">
          <label>Multiplicadores de pontuação</label>
          <div class="triple">
            <div>
              <label for="scoreMultiplierEasy">Fácil</label>
              <input id="scoreMultiplierEasy" type="number" step="0.1" />
            </div>
            <div>
              <label for="scoreMultiplierMedium">Médio</label>
              <input id="scoreMultiplierMedium" type="number" step="0.1" />
            </div>
            <div>
              <label for="scoreMultiplierHard">Difícil</label>
              <input id="scoreMultiplierHard" type="number" step="0.1" />
            </div>
          </div>
        </div>
        <div class="hint">Exemplo: fácil 0.5x, médio 1x, difícil 2x.</div>

        <div class="actions">
          <button class="btn primary" id="saveBtn">Salvar alterações</button>
          <button class="btn" id="resetBtn">Restaurar padrão</button>
          <button class="btn danger" id="clearRankingBtn">Limpar ranking</button>
        </div>

        <div id="status" class="status">Alterações salvas com sucesso.</div>

        <h2 style="margin-top:24px;">Ranking atual</h2>
        <div class="muted">Use isso para conferir os registros antes de limpar.</div>
        <div id="rankingList" class="ranking-box"></div>
      </div>
    </div>
  </div>

  <script>
    const APP_STORAGE_KEY = "salvador_map_quiz_settings_v1";
    const RANKING_KEY = "salvador_bairros_ranking_v1";
    const DEFAULT_APP_SETTINGS = {
      landingTitle: "Bairros de Salvador",
      landingSubtitle: "Um jogo de mapa interativo para testar sua memória geográfica de Salvador.",
      gameTitle: "Bairros de Salvador",
      gameSubtitle: "Jogo de mapa interativo",
      brandBadge: "SALVADOR MAP QUIZ",
      gameDescription: "Teste seus conhecimentos de geografia urbana local clicando no bairro correto dentro do mapa oficial vetorizado de Salvador. O jogo foi feito para estudar localização, forma e vizinhança dos bairros de um jeito visual e prático.",
      mapHint: "Explore o mapa, ajuste o zoom e toque no bairro correto.",
      emptyTitle: "Pronto para jogar?",
      emptyCopy: "Abra o mapa, receba o bairro sorteado e tente marcar o local certo antes de errar 3 vezes ou acabar o tempo.",
      startButtonText: "Começar jogo",
      scoreMultiplierEasy: 0.5,
      scoreMultiplierMedium: 1,
      scoreMultiplierHard: 2
    };

    function loadSettings() {
      try {
        return { ...DEFAULT_APP_SETTINGS, ...(JSON.parse(localStorage.getItem(APP_STORAGE_KEY) || "{}")) };
      } catch (e) {
        return { ...DEFAULT_APP_SETTINGS };
      }
    }

    function saveSettings(settings) {
      localStorage.setItem(APP_STORAGE_KEY, JSON.stringify(settings));
    }

    function loadRanking() {
      try {
        return JSON.parse(localStorage.getItem(RANKING_KEY) || "[]");
      } catch (e) {
        return [];
      }
    }

    function renderRanking() {
      const ranking = loadRanking().sort((a,b) => b.score - a.score || a.timestamp - b.timestamp);
      const box = document.getElementById("rankingList");
      if (!ranking.length) {
        box.innerHTML = '<div class="ranking-item">Ainda não há pontuações salvas.</div>';
        return;
      }
      box.innerHTML = ranking.map((item, index) => {
        const difficultyLabel = item.difficulty === "easy" ? "Fácil" : item.difficulty === "hard" ? "Difícil" : "Médio";
        const when = new Date(item.timestamp).toLocaleDateString("pt-BR");
        return `<div class="ranking-item">
          <div style="font-weight:900; margin-bottom:4px;">${index + 1}. ${item.name} — ${item.score} pts</div>
          <div class="muted">${difficultyLabel} • ${item.timePerRound || "-"}s por rodada • ${when}</div>
        </div>`;
      }).join("");
    }

    function fillForm() {
      const s = loadSettings();
      Object.keys(DEFAULT_APP_SETTINGS).forEach((key) => {
        const el = document.getElementById(key);
        if (el) el.value = s[key];
      });
    }

    function showStatus(text) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.style.display = "block";
      clearTimeout(window.__statusTimer);
      window.__statusTimer = setTimeout(() => status.style.display = "none", 2400);
    }

    document.getElementById("saveBtn").addEventListener("click", () => {
      const updated = {};
      Object.keys(DEFAULT_APP_SETTINGS).forEach((key) => {
        const el = document.getElementById(key);
        if (!el) return;
        updated[key] = ["scoreMultiplierEasy","scoreMultiplierMedium","scoreMultiplierHard"].includes(key)
          ? Number(el.value)
          : el.value;
      });
      saveSettings(updated);
      showStatus("Alterações salvas com sucesso.");
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      saveSettings(DEFAULT_APP_SETTINGS);
      fillForm();
      showStatus("Configurações restauradas para o padrão.");
    });

    document.getElementById("clearRankingBtn").addEventListener("click", () => {
      localStorage.setItem(RANKING_KEY, "[]");
      renderRanking();
      showStatus("Ranking limpo.");
    });

    fillForm();
    renderRanking();
  </script>
</body>
</html>
